version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chalo_coffee}
      POSTGRES_USER: ${POSTGRES_USER:-chauip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4310}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chauip}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./chalo-be
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: pnpm run start:dev
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-chauip}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-4310}
      DB_DATABASE: ${POSTGRES_DB:-chalo_coffee}
      DB_SYNCHRONIZE: "true"
      JWT_SECRET: ${JWT_SECRET:-chalo_coffee_secret_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-chalo_coffee_refresh_secret_change_in_production}
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    volumes:
      - ./chalo-be/src:/app/src
      - /app/node_modules
    ports:
      - "8080:8080"
      - "9229:9229"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./chalo-fe
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: pnpm run dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
      INTERNAL_API_BASE_URL: http://backend:8080/api
    volumes:
      - ./chalo-fe/src:/app/src
      - ./chalo-fe/public:/app/public
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: